<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigaLib - Your Game Library</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --accent: #7c3aed;
            --accent-hover: #6d28d9;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #334155;
            --steam: #1b2838;
            --xbox: #107c10;
            --ea: #ff4747;
            --ubisoft: #0070ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .navbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 1024px) {
            .layout { grid-template-columns: 1fr; }
        }

        /* Game Library */
        .library-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .library-header h2 { font-size: 1.25rem; }

        .filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(124, 58, 237, 0.1);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .game-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.2s;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.2);
        }

        .game-card img {
            width: 100%;
            height: 100px;
            object-fit: cover;
        }

        .game-card .no-img {
            width: 100%;
            height: 100px;
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .game-info {
            padding: 0.75rem;
        }

        .game-info h3 {
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .game-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .platform-badge {
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .platform-steam { background: var(--steam); color: #66c0f4; }
        .platform-xbox { background: rgba(16, 124, 16, 0.2); color: #4caf50; }
        .platform-ea { background: rgba(255, 71, 71, 0.2); color: var(--ea); }
        .platform-ubisoft { background: rgba(0, 112, 255, 0.2); color: var(--ubisoft); }

        .playtime {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        /* AI Assistant Panel */
        .assistant-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 140px);
            position: sticky;
            top: 90px;
        }

        .assistant-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .assistant-header .dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .assistant-header h3 { font-size: 0.95rem; }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message {
            max-width: 90%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .message-user {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-ai {
            align-self: flex-start;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message-ai strong { color: var(--accent); }

        .chat-input-area {
            padding: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
        }

        .chat-input-area input {
            flex: 1;
            padding: 0.6rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.85rem;
            outline: none;
        }

        .chat-input-area input:focus {
            border-color: var(--accent);
        }

        .chat-input-area button {
            padding: 0.6rem 1rem;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state h3 { margin-bottom: 0.5rem; color: var(--text-primary); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 450px;
        }

        .modal h3 { margin-bottom: 1.5rem; }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.6rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .modal-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>⚡ GigaLib</h1>
        <div class="nav-actions">
            <button class="btn btn-secondary" onclick="openAddModal()">+ Add Game</button>
            <button class="btn btn-secondary" id="enrichBtn" onclick="enrichLibrary()">🧠 Enrich All</button>
            <button class="btn btn-primary" id="syncBtn" onclick="syncLibrary()">🔄 Sync All</button>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <!-- Add Game Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <h3>Add Game Manually</h3>
            <div class="form-group">
                <label>Game Title</label>
                <input type="text" id="gameTitle" placeholder="e.g. Star Wars Jedi: Survivor">
            </div>
            <div class="form-group">
                <label>Platform</label>
                <select id="gamePlatform">
                    <option value="steam">Steam</option>
                    <option value="xbox">Xbox</option>
                    <option value="ea">EA</option>
                    <option value="ubisoft">Ubisoft</option>
                </select>
            </div>
            <div class="form-group">
                <label>Genre (optional)</label>
                <input type="text" id="gameGenre" placeholder="e.g. Action RPG">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeAddModal()">Cancel</button>
                <button class="btn btn-primary" onclick="addGame()">Add Game</button>
            </div>
        </div>
    </div>

    <!-- Game Detail Modal -->
    <div class="modal-overlay" id="gameDetailModal">
        <div class="modal" style="max-width: 600px;">
            <div id="gameDetailContent">Loading...</div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeGameDetail()">Close</button>
            </div>
        </div>
    </div>

    <script>
        function openAddModal() {
            document.getElementById('addModal').classList.add('active');
        }
        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
        }
        function closeGameDetail() {
            document.getElementById('gameDetailModal').classList.remove('active');
        }

        async function showGameDetail(gameId) {
            const modal = document.getElementById('gameDetailModal');
            const content = document.getElementById('gameDetailContent');
            modal.classList.add('active');
            content.innerHTML = '<em>Loading...</em>';

            try {
                const resp = await fetch(`/games/${gameId}`);
                const game = await resp.json();
                
                let html = `<div style="display:flex;gap:1rem;margin-bottom:1rem;">`;
                if (game.image_url) {
                    html += `<img src="${game.image_url}" style="width:120px;height:70px;object-fit:cover;border-radius:8px;"
                             onerror="this.style.display='none'">`;
                }
                html += `<div>
                    <h3 style="margin-bottom:0.3rem;">${game.title}</h3>
                    <span class="platform-badge platform-${game.platform}">${game.platform}</span>
                    ${game.is_installed ? '<span style="color:#10b981;font-size:0.75rem;margin-left:0.5rem;">● Installed</span>' : ''}
                    <button onclick="launchGame(${game.id})" style="margin-left:0.5rem;padding:0.2rem 0.6rem;font-size:0.75rem;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;">▶ Launch</button>
                </div></div>`;

                if (game.description) {
                    html += `<p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:1rem;">${game.description}</p>`;
                }

                html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1rem;">`;
                if (game.playtime_hours) {
                    html += `<div style="background:var(--bg-primary);padding:0.6rem;border-radius:8px;">
                        <div style="font-size:0.7rem;color:var(--text-secondary);">Playtime</div>
                        <div style="font-size:1rem;font-weight:600;">${game.playtime_hours}h</div>
                    </div>`;
                } else if (game.last_played) {
                    html += `<div style="background:var(--bg-primary);padding:0.6rem;border-radius:8px;">
                        <div style="font-size:0.7rem;color:var(--text-secondary);">Last Played</div>
                        <div style="font-size:0.85rem;font-weight:600;">${new Date(game.last_played).toLocaleDateString()}</div>
                    </div>`;
                }
                if (game.critic_rating) {
                    html += `<div style="background:var(--bg-primary);padding:0.6rem;border-radius:8px;">
                        <div style="font-size:0.7rem;color:var(--text-secondary);">Critic Rating</div>
                        <div style="font-size:1rem;font-weight:600;">${game.critic_rating}/100 <span style="font-size:0.75rem;color:var(--accent);">${game.rating_tier || ''}</span></div>
                    </div>`;
                }
                if (game.main_story_hours) {
                    html += `<div style="background:var(--bg-primary);padding:0.6rem;border-radius:8px;">
                        <div style="font-size:0.7rem;color:var(--text-secondary);">Main Story</div>
                        <div style="font-size:1rem;font-weight:600;">${game.main_story_hours}h</div>
                    </div>`;
                }
                if (game.completionist_hours) {
                    html += `<div style="background:var(--bg-primary);padding:0.6rem;border-radius:8px;">
                        <div style="font-size:0.7rem;color:var(--text-secondary);">Completionist</div>
                        <div style="font-size:1rem;font-weight:600;">${game.completionist_hours}h</div>
                    </div>`;
                }
                html += `</div>`;

                if (game.genre) {
                    html += `<div style="margin-bottom:0.5rem;"><span style="font-size:0.75rem;color:var(--text-secondary);">Genre:</span> <span style="font-size:0.85rem;">${game.genre}</span></div>`;
                }
                if (game.tags) {
                    html += `<div style="margin-bottom:0.5rem;"><span style="font-size:0.75rem;color:var(--text-secondary);">Tags:</span> <span style="font-size:0.85rem;">${game.tags}</span></div>`;
                }
                if (game.review) {
                    html += `<div style="margin-top:1rem;padding:0.75rem;background:var(--bg-primary);border-radius:8px;border-left:3px solid var(--accent);">
                        <div style="font-size:0.7rem;color:var(--text-secondary);margin-bottom:0.3rem;">Your Review</div>
                        <div style="font-size:0.85rem;">${game.review}</div>
                    </div>`;
                }

                content.innerHTML = html;
            } catch(e) {
                content.innerHTML = 'Failed to load game details.';
            }
        }

        async function launchGame(gameId) {
            try {
                const resp = await fetch(`/games/${gameId}/launch`, { method: 'POST' });
                const data = await resp.json();
                if (data.error) {
                    alert('Launch failed: ' + data.error);
                }
            } catch(e) {
                alert('Launch failed: ' + e.message);
            }
        }

        async function syncLibrary() {
            const btn = document.getElementById('syncBtn');
            btn.textContent = '⏳ Syncing...';
            btn.disabled = true;
            try {
                const resp = await fetch('/sync', { method: 'POST' });
                const data = await resp.json();
                console.log('Sync results:', data);
                location.reload();
            } catch(e) {
                alert('Sync failed: ' + e.message);
            } finally {
                btn.textContent = '🔄 Sync All';
                btn.disabled = false;
            }
        }

        async function enrichLibrary() {
            const btn = document.getElementById('enrichBtn');
            btn.textContent = '⏳ Enriching...';
            btn.disabled = true;
            try {
                const resp = await fetch('/enrich', { method: 'POST', signal: AbortSignal.timeout(120000) });
                const data = await resp.json();
                console.log('Enrich results:', data);
                if (data.remaining > 0) {
                    alert(`Enriched ${data.enriched} games. ${data.remaining} still need enrichment — click again or run: uv run python gigalib/enrich.py`);
                } else {
                    alert(`Done! ${data.enriched} games enriched.`);
                }
                location.reload();
            } catch(e) {
                alert('Enrich failed: ' + e.message);
            } finally {
                btn.textContent = '🧠 Enrich All';
                btn.disabled = false;
            }
        }

        async function addGame() {
            const title = document.getElementById('gameTitle').value.trim();
            const platform = document.getElementById('gamePlatform').value;
            const genre = document.getElementById('gameGenre').value.trim();
            if (!title) return alert('Title is required');

            const resp = await fetch('/games/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, platform, genre })
            });

            if (resp.ok) {
                closeAddModal();
                location.reload();
            } else {
                alert('Failed to add game');
            }
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
